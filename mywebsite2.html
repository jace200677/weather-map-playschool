<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a0f1e" />
<title>Ryan Hall, Y'all | Live Severe Weather Coverage</title>

<link rel="icon" type="image/png" href="/r-fav.png" />
<link rel="canonical" href="https://ryanhallyall.com" />

<meta name="description" content="Live severe weather coverage, tornado tracking, expert forecasts and real-time radar from Ryan Hall, Y'all." />
<meta name="robots" content="index, follow" />

<!-- Open Graph -->
<meta property="og:type" content="website" />
<meta property="og:title" content="Ryan Hall, Y'all | Live Severe Weather Coverage" />
<meta property="og:description" content="Tornado tracking, live storm coverage, and expert forecasts." />
<meta property="og:image" content="https://ryanhallyall.com/og-image.png" />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0f1e;
  --panel:#121a2f;
  --accent:#ff3c3c;
  --yellow:#ffc400;
  --green:#19c37d;
  --text:#e6edf3;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
}

header{
  background:linear-gradient(90deg,#10172a,#0f213f);
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:2px solid #1e2a4a;
}

.logo{
  font-family:'Rajdhani',sans-serif;
  font-size:28px;
  font-weight:700;
  letter-spacing:1px;
}

.status{
  padding:8px 16px;
  border-radius:30px;
  font-weight:600;
  font-size:14px;
}

/* STREAM STATUS COLORS */
.off{ background:#333; }
.standby{ background:var(--yellow); color:#000; }
.live{ background:var(--accent); animation:pulse 1.5s infinite; }

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(255,60,60,.7);}
  70%{box-shadow:0 0 0 15px rgba(255,60,60,0);}
  100%{box-shadow:0 0 0 0 rgba(255,60,60,0);}
}

.hero{
  padding:80px 20px;
  text-align:center;
}

.hero h1{
  font-size:48px;
  margin:0;
  font-family:'Rajdhani',sans-serif;
}

.hero p{
  opacity:.8;
  margin-top:15px;
  font-size:18px;
}

.section{
  padding:60px 20px;
  background:var(--panel);
}

.card{
  max-width:800px;
  margin:auto;
  padding:30px;
  background:#1a233a;
  border-radius:12px;
  text-align:center;
}
</style>
</head>

<body>

<header>
  <div class="logo">RYAN HALL, Y'ALL</div>
  <!-- Change class dynamically with JS -->
  <div id="streamStatus" class="status off">STREAM: OFF</div>
</header>

<section class="hero">
  <h1>Live Severe Weather Coverage</h1>
  <p>Tornado tracking • Real-time radar • Expert forecasts</p>
</section>

<section class="section">
  <div class="card">
    <h2>Storm Mode</h2>
    <p>When severe weather threatens the U.S., this page can automatically switch to STANDBY or LIVE.</p>
  </div>
</section>

<div id="root"></div>

<script>
/* SIMPLE DEMO STREAM MODE SWITCH */
function setStreamStatus(mode){
  const el=document.getElementById("streamStatus");
  el.className="status "+mode;

  if(mode==="live") el.innerText="STREAM: LIVE";
  else if(mode==="standby") el.innerText="STREAM: STANDBY";
  else el.innerText="STREAM: OFF";
}

/* Example manual test */
setStreamStatus("standby"); 
// change to: "off" or "live"
</script>

</body>
</html>
