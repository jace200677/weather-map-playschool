<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jace Weather Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>

:root{
--primary:#0ff;
--accent:#f5c542;
--danger:#ff0044;
--card:#111;
--bg:#050505;
}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:#0ff;
}

header{
text-align:center;
padding:3rem 1rem;
background:linear-gradient(90deg,#0ff,#00f,#0ff);
color:white;
}

nav{
display:flex;
justify-content:center;
gap:1rem;
background:#111;
padding:1rem;
}

nav a{
color:#0ff;
text-decoration:none;
font-weight:600;
}

section{
max-width:960px;
margin:auto;
padding:2rem 1rem;
}

.card{
background:var(--card);
padding:1.5rem;
border-radius:14px;
margin-bottom:1.5rem;
box-shadow:0 0 20px rgba(0,255,255,0.2);
}

.score{
font-family:Orbitron;
font-size:3rem;
}

.score.high{
color:var(--danger);
}

.level{
font-weight:bold;
background:var(--accent);
color:black;
display:inline-block;
padding:4px 10px;
border-radius:999px;
margin-top:5px;
}

#alertMap{
height:400px;
border-radius:12px;
}

iframe{
width:100%;
height:315px;
border-radius:12px;
border:none;
}

footer{
background:#111;
text-align:center;
padding:2rem;
}

</style>
</head>

<body>

<header>
<h1>Jace Weather Dashboard</h1>
</header>

<nav>
<a href="#weather">Weather</a>
<a href="#map">Map</a>
<a href="#youtube">YouTube</a>
</nav>

<section id="weather">

<h2>Weather Score</h2>

<div class="card">

<div class="score" id="score">--</div>

<div class="level" id="level">Loading</div>

<p id="details"></p>

<p>
Dynamic Threshold:
<span id="thresholdValue">--</span>
</p>

<p id="thresholdWarning" style="display:none;color:red;font-weight:bold;">
⚠ Threshold Exceeded
</p>

</div>

<div class="card">
<h3>Weather Alerts</h3>
<ul id="alertsList"></ul>
</div>

<div class="card">
<h3>Forecast</h3>
<canvas id="chart"></canvas>
</div>

</section>

<section id="map">

<h2>Weather Alert Map</h2>

<div id="alertMap"></div>

</section>

<section id="youtube">

<h2>YouTube</h2>

<div id="ytLive"></div>

</section>

<footer>
2026 Neon Weather Dashboard
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const LAT = 44.9778
const LON = -93.2650

const NWS_POINTS = `https://api.weather.gov/points/${LAT},${LON}`
const ALERT_URL = "https://api.weather.gov/alerts/active"

let chart
let DYNAMIC_THRESHOLD = 300
let NATIONAL_ALERT_SCORE = 0

// ALERT SEVERITY

function alertSeverityWeight(event){

event = event.toLowerCase()

if(event.includes("tornado")) return 120
if(event.includes("hurricane")) return 120
if(event.includes("blizzard")) return 100
if(event.includes("severe thunderstorm")) return 80
if(event.includes("flood")) return 70
if(event.includes("winter storm")) return 60
if(event.includes("warning")) return 50
if(event.includes("watch")) return 40
if(event.includes("advisory")) return 30

return 10
}

// COVERAGE

function coverageScore(area){

const states = area.split(",")

return Math.min(states.length * 10,100)

}

// TIME DECAY

function timeDecayScore(time){

const now = new Date()

const issued = new Date(time)

const hours = (now - issued)/3600000

return Math.max(0.2,1 - hours*0.08)

}

// COMBINE ALERT SCORES

function combineScores(scores){

const sumSquares = scores.reduce((a,b)=>a+b*b,0)

return Math.sqrt(sumSquares)

}

// LOCAL WEATHER SCORE

function calculateLocalIntensity(temp,wind,humidity,precip){

let score = 0

if(temp>=90||temp<=32) score+=70
else if(temp>=80||temp<=40) score+=40

if(wind>=30) score+=80
else if(wind>=15) score+=40

if(precip>0.3) score+=80
else if(precip>0.05) score+=40

if(humidity>=90||humidity<=20) score+=40

return score

}

// FETCH ALERTS

async function updateAlerts(){

const res = await fetch(ALERT_URL)

const data = await res.json()

const list = document.getElementById("alertsList")

list.innerHTML=""

let scores=[]
let coverage=0

data.features.forEach(alert=>{

const event = alert.properties.event

const area = alert.properties.areaDesc

const time = alert.properties.sent

const sev = alertSeverityWeight(event)

const decay = timeDecayScore(time)

const cov = coverageScore(area)

coverage += cov

const score = sev * decay

scores.push(score)

const li=document.createElement("li")

li.textContent = event+" — "+area

list.appendChild(li)

})

coverage=Math.min(coverage,100)

const eventFactor=Math.min(scores.length*5,100)

const alertImpact=combineScores(scores)

NATIONAL_ALERT_SCORE = alertImpact

return {alertImpact,coverage,eventFactor}

}

// FETCH LOCAL WEATHER

async function getLocalWeather(){

try{

const p = await fetch(NWS_POINTS).then(r=>r.json())

const stations = await fetch(p.properties.observationStations).then(r=>r.json())

const id = stations.features[0].properties.stationIdentifier

const obs = await fetch(`https://api.weather.gov/stations/${id}/observations/latest`).then(r=>r.json())

const d = obs.properties

return{

temp:d.temperature.value*9/5+32,

wind:d.windSpeed.value*2.23694,

humidity:d.relativeHumidity.value,

precip:(d.precipitationLastHour.value||0)*0.039

}

}

catch{

return {temp:70,wind:5,humidity:50,precip:0}

}

}

// FINAL WEATHER SCORE

function computeWeatherScore(local,alerts,coverage,count){

let score =

(local*0.35)+

(alerts*0.35)+

(coverage*0.15)+

(count*0.15)

return Math.min(score,500)

}

// UPDATE DASHBOARD

async function updateWeather(){

const local = await getLocalWeather()

const alertData = await updateAlerts()

const localScore = calculateLocalIntensity(local.temp,local.wind,local.humidity,local.precip)

const finalScore = computeWeatherScore(localScore,alertData.alertImpact,alertData.coverage,alertData.eventFactor)

DYNAMIC_THRESHOLD = Math.max(NATIONAL_ALERT_SCORE,300)

document.getElementById("score").textContent = Math.round(finalScore)

document.getElementById("thresholdValue").textContent = Math.round(DYNAMIC_THRESHOLD)

if(finalScore >= DYNAMIC_THRESHOLD){

document.getElementById("score").classList.add("high")

document.getElementById("thresholdWarning").style.display="block"

}

document.getElementById("level").textContent =

finalScore>350?"Extreme":
finalScore>250?"High":
finalScore>150?"Moderate":
"Low"

document.getElementById("details").textContent=

`Temp ${local.temp.toFixed(1)}°F | Wind ${local.wind.toFixed(1)} mph | Humidity ${local.humidity}%`

generateChart(finalScore)

}

// FORECAST CHART

function generateChart(current){

const labels=[]
const data=[]

for(let i=0;i<60;i++){

labels.push(i)

data.push(Math.max(current+(Math.random()*80-40),0))

}

const ctx=document.getElementById("chart")

if(chart) chart.destroy()

chart=new Chart(ctx,{

type:"line",

data:{

labels:labels,

datasets:[

{label:"Weather Score",data:data,borderColor:"cyan",tension:.3},

{label:"Threshold",data:Array(60).fill(DYNAMIC_THRESHOLD),borderColor:"red",borderDash:[5,5]}

]

},

options:{scales:{y:{min:0,max:500}}}

})

}

// YOUTUBE LIVE

const API_KEY="YOUR_KEY"
const CHANNEL="UCJHzNTAtr8FK90YWe4Dqt3A"

async function loadYouTube(){

const live=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL}&eventType=live&type=video&key=${API_KEY}`).then(r=>r.json())

const container=document.getElementById("ytLive")

if(live.items.length){

container.innerHTML=`<iframe src="https://www.youtube.com/embed/${live.items[0].id.videoId}?autoplay=1"></iframe>`

}

}

// MAP

const map=L.map("alertMap").setView([LAT,LON],4)

L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)

async function updateMap(){

const data=await fetch(ALERT_URL).then(r=>r.json())

data.features.forEach(a=>{

if(a.geometry){

const coords=a.geometry.coordinates[0]

coords.forEach(c=>{

L.circle([c[1],c[0]],{

radius:10000,

color:"red"

}).addTo(map)

})

}

})

}

// RUN

async function refresh(){

await updateWeather()

await loadYouTube()

await updateMap()

}

refresh()

setInterval(refresh,60000)

</script>

</body>
</html>
