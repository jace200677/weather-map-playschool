<nav>

<script>
const now = new Date();

const may26Start = new Date("2026-05-26T17:45:00");
const may26End   = new Date("2026-05-26T23:59:59");

const maintenanceStart = new Date("2026-05-27T00:00:00");
const maintenanceEnd   = new Date("2026-06-30T23:59:59");

function showNotice(message) {
    const noticeDiv = document.createElement("div");
    noticeDiv.className = "notice-banner";
    noticeDiv.innerHTML = message;

    document.body.prepend(noticeDiv);
    document.body.classList.add("notice-active");
}

// Pre-maintenance warning (May 26 evening window)
if (now >= may26Start && now <= may26End) {
    showNotice("⚠️ Notice: Maintenance will begin on May 27, 2026 and continue through June 30, 2026.");
}

// Active maintenance period (May 27 – June 1)
else if (now >= maintenanceStart && now <= maintenanceEnd) {
    showNotice("🔧 Maintenance is currently in place. Services may be unavailable or limited until June 30, 2026.");
}

</script>
    
<section id="weather">

<h2>Weather Score</h2>

<div class="card">

<div class="score" id="score">--</div>

<div class="level" id="level">Loading</div>

<p id="description"></p>

<p id="details"></p>

</div>

<div class="card">

<h3>Active Weather Alerts</h3>

<ul id="alertsList"></ul>

</div>

<div class="card">

<h3>Weather Score Forecast</h3>

<canvas id="chart"></canvas>

</div>

</section>

<section id="map">

<h2>Weather Alert Map</h2>

<div id="alertMap"></div>

</section>

<section id="youtube">

<h2>YouTube Live</h2>

<div id="ytLive"></div>

</section>

<footer>
2026 Neon Weather Dashboard
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* LOCATION */

const LAT = 44.9778
const LON = -93.2650

const ALERT_URL="https://api.weather.gov/alerts/active"
const NWS_POINTS=`https://api.weather.gov/points/${LAT},${LON}`

let chart

/* ALERT SEVERITY */

function alertSeverity(event){

event=event.toLowerCase()

const weights={

"tornado warning":80,
"tornado watch":40,

"severe thunderstorm warning":35,
"severe thunderstorm watch":20,

"flash flood warning":35,
"flash flood watch":20,

"blizzard warning":40,
"winter storm warning":30,
"ice storm warning":40,

"snow squall warning":25,
"winter weather advisory":10,

"high wind warning":20,
"wind advisory":8,

"hurricane warning":100,
"hurricane watch":60,
"tropical storm warning":40,
"storm surge warning":70

}

for(const k in weights){

if(event.includes(k)) return weights[k]

}

return 5

}

/* TIME DECAY */

function timeDecay(time){

const now=new Date()
const issued=new Date(time)

const hours=(now-issued)/3600000

return Math.max(.25,1-hours*.08)

}

/* COMBINE ALERT SCORES */

function combineScores(scores){

let sum=0

scores.forEach(s=>{

sum+=s*s

})

return Math.sqrt(sum)

}

/* COVERAGE */

function coverageScore(area){

const states=area.split(",")

return Math.min(states.length*5,50)

}

/* LOCAL WEATHER */

function calculateLocalIntensity(temp,wind,humidity,precip){

let score=0

if(temp>=95||temp<=10) score+=10
else if(temp>=85||temp<=25) score+=5

if(wind>=40) score+=15
else if(wind>=25) score+=8

if(precip>0.5) score+=12
else if(precip>0.1) score+=6

if(humidity>=95||humidity<=15) score+=5

return score

}

/* FETCH ALERTS */

async function updateAlerts(){

    try{

        // USA-only check
        const geo = await fetch("https://ipapi.co/json/")
            .then(r => r.json());

        if(geo.country_code !== "US"){

            const list = document.getElementById("alertsList");

            if(list){
                list.innerHTML = "";

                const li = document.createElement("li");
                li.textContent =
                    "Weather alerts are available only in the United States.";
                list.appendChild(li);
            }

            return{
                alertImpact: 0,
                coverage: 0,
                count: 0
            };
        }

        const res = await fetch(ALERT_URL);
        const data = await res.json();

        const list = document.getElementById("alertsList");

        list.innerHTML = "";

        let scores = [];
        let coverage = 0;
        let count = 0;

        data.features.forEach(alert => {

            const event = alert.properties.event;
            const area = alert.properties.areaDesc;
            const time = alert.properties.sent;

            const sev = alertSeverity(event);
            const decay = timeDecay(time);

            scores.push(sev * decay);

            coverage += coverageScore(area);

            count++;

            const li = document.createElement("li");

            li.textContent = event + " — " + area;

            list.appendChild(li);

        });

        coverage = Math.min(coverage, 50);

        const alertImpact = combineScores(scores);

        return{
            alertImpact,
            coverage,
            count
        };

    }
    catch{

        return{
            alertImpact: 0,
            coverage: 0,
            count: 0
        };

    }

}

/* LOCAL WEATHER */

async function getLocalWeather(){

    try{

        // Block non-USA users
        const geo = await fetch("https://ipapi.co/json/").then(r => r.json());

        if(geo.country_code !== "US"){
            throw new Error("Outside USA");
        }

        const p = await fetch(NWS_POINTS).then(r => r.json());

        const stations = await fetch(
            p.properties.observationStations
        ).then(r => r.json());

        const id =
            stations.features[0].properties.stationIdentifier;

        const obs = await fetch(
            `https://api.weather.gov/stations/${id}/observations/latest`
        ).then(r => r.json());

        const d = obs.properties;

        return{
            country: "US",
            temp: d.temperature.value != null
                ? d.temperature.value * 9/5 + 32
                : 70,

            wind: d.windSpeed.value != null
                ? d.windSpeed.value * 2.23694
                : 5,

            humidity: d.relativeHumidity.value ?? 50,

            precip: d.precipitationLastHour.value != null
                ? d.precipitationLastHour.value * 0.0393701
                : 0
        };

    }
    catch{

        // Fallback values
        return{
            country: "US",
            temp: 70,
            wind: 5,
            humidity: 50,
            precip: 0
        };

    }

}

/* FINAL SCORE */

function computeScore({
    warnings = [],
    populationAffected = 0,
    simultaneousEvents = 0
}) {

    let score = 0;

    warnings.forEach(warning => {

        let base = 0;

        // Storm type weighting
        switch (warning.type) {

            case "Tornado Warning":
                base = 25;
                break;

            case "Tornado Emergency":
                base = 60;
                break;

            case "Severe Thunderstorm Warning":
                base = 10;
                break;

            case "Flash Flood Warning":
                base = 8;
                break;

            case "Blizzard Warning":
                base = 15;
                break;

            case "Hurricane Warning":
                base = 40;
                break;

            default:
                base = 5;
        }

        // Severity weighting
        switch (warning.severity) {

            case "Extreme":
                base *= 2.0;
                break;

            case "Severe":
                base *= 1.5;
                break;

            case "Moderate":
                base *= 1.2;
                break;
        }

        // Enhanced tags
        if (warning.tags?.includes("PDS"))
            base *= 1.75;

        if (warning.tags?.includes("Tornado Emergency"))
            base *= 2.5;

        // Radar confirmed tornado
        if (warning.tags?.includes("Confirmed"))
            base *= 1.4;

        // Population scaling
        const popFactor =
            Math.log10((warning.population || 1000) + 1);

        score += base * popFactor;
    });

    // National population impact
    score += Math.log10(populationAffected + 1) * 8;

    // Multiple simultaneous outbreaks
    score += simultaneousEvents * 4;

    // Clamp
    return Math.min(Math.round(score), 250);
}

/* LEVELS */

function getLevel(score){

    if(score >= 250)
        return ["Historic","Potentially historic event."];

    if(score >= 150)
        return ["Extreme","Extreme national weather event."];

    if(score >= 120)
        return ["Major Event","Major event level, such as widespread damaging severe weather, a significant snowstorm, or a hurricane landfall."];

    if(score >= 90)
        return ["High Risk","Serious multi-area or high-impact weather. The team will likely go live if conditions keep lining up."];

    if(score >= 70)
        return ["Going Live","Significant weather is active. Live coverage becomes much more likely."];

    if(score >= 50)
        return ["Standby","Notable weather is underway or developing. Standby becomes more likely."];

    if(score >= 30)
        return ["Watching","Some active weather somewhere in the country. The team is watching."];

    return ["Quiet","Mostly quiet nationally. Routine weather overall."];
}

/* UPDATE WEATHER */

async function updateWeather(){

const local=await getLocalWeather()

const alertData=await updateAlerts()

const localScore=calculateLocalIntensity(local.temp,local.wind,local.humidity,local.precip)

const finalScore=computeScore(localScore,alertData.alertImpact,alertData.coverage,alertData.count)

document.getElementById("score").textContent=Math.round(finalScore)

const level=getLevel(finalScore)

document.getElementById("level").textContent=level[0]

document.getElementById("description").textContent=level[1]

document.getElementById("details").textContent=
`Temp ${local.temp.toFixed(1)}°F | Wind ${local.wind.toFixed(1)} mph | Humidity ${local.humidity}%`

generateChart(finalScore)

}

/* CHART */

function generateChart(current){

const labels=[]
const data=[]

for(let i=0;i<60;i++){

labels.push(i)

data.push(Math.max(current+(Math.random()*30-15),0))

}

const ctx=document.getElementById("chart")

if(chart) chart.destroy()

chart=new Chart(ctx,{

type:"line",

data:{

labels:labels,

datasets:[

{label:"Weather Score",data:data,borderColor:"cyan",tension:.3}

]

},

options:{

scales:{y:{min:0,max:200}}

}

})

}

/* MAP */

const map=L.map("alertMap").setView([LAT,LON],4)

L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)

async function updateMap(){

const data=await fetch(ALERT_URL).then(r=>r.json())

data.features.forEach(a=>{

if(a.geometry){

const coords=a.geometry.coordinates[0]

coords.forEach(c=>{

L.circle([c[1],c[0]],{

radius:15000,
color:"red"

}).addTo(map)

})

}

})

}

/* YOUTUBE */

const API_KEY="AIzaSyBHLdxart5m9Rf7VQicCFb8J1oFFEyy0bQ"
const CHANNEL="UCJHzNTAtr8FK90YWe4Dqt3A"

async function loadYouTube(){

try{

const live=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL}&eventType=live&type=video&key=${API_KEY}`).then(r=>r.json())

const container=document.getElementById("ytLive")

if(live.items.length){

container.innerHTML=`<iframe width="100%" height="315" src="https://www.youtube.com/embed/${live.items[0].id.videoId}?autoplay=1" allowfullscreen></iframe>`

}

}

catch{}

}

/* REFRESH */

async function refresh(){

await updateWeather()
await updateMap()
await loadYouTube()

}

refresh()

setInterval(refresh,60000)

</script>

</body>
