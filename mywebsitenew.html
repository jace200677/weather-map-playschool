<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U.S. Severe Weather Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
  background-size:400% 400%;
  animation:bgMove 15s ease infinite;
  color:white;
}
@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

header{
  text-align:center;
  padding:2rem 1rem;
}
header h1{
  font-size:2.2rem;
  font-weight:800;
  letter-spacing:1px;
}

.dashboard{
  max-width:1200px;
  margin:auto;
  padding:2rem;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:1.5rem;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(14px);
  border-radius:20px;
  padding:1.5rem;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  transition:0.3s ease;
}
.card:hover{
  transform:translateY(-5px);
}

.score{
  font-size:3.5rem;
  font-weight:800;
}

.badge{
  display:inline-block;
  padding:0.4rem 0.9rem;
  border-radius:999px;
  font-weight:600;
  margin-top:0.5rem;
}

.low{background:#16a34a;}
.medium{background:#facc15;color:black;}
.high{background:#f97316;}
.extreme{background:#dc2626;}

.section-title{
  font-weight:700;
  margin-bottom:1rem;
  opacity:0.9;
}

ul{
  list-style:none;
  max-height:200px;
  overflow:auto;
}
li{
  padding:0.4rem 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

#videoChance{
  font-size:1.2rem;
  font-weight:700;
  margin-top:1rem;
}

#liveMode{
  margin-top:1rem;
  padding:0.8rem;
  border-radius:12px;
  font-weight:700;
  text-align:center;
}

footer{
  text-align:center;
  padding:2rem;
  opacity:0.6;
  font-size:0.9rem;
}
</style>
</head>

<body>

<header>
<h1>🇺🇸 United States Severe Weather Dashboard</h1>
</header>

<div class="dashboard">

<div class="card">
<div class="section-title">Composite Weather Score</div>
<div class="score" id="score">--</div>
<div id="levelBadge" class="badge">Loading...</div>
<div style="margin-top:0.5rem;font-size:0.9rem;opacity:0.7">
Dynamic Threshold: <span id="thresholdValue">--</span>
</div>
</div>

<div class="card">
<div class="section-title">Daily Severe Outlook</div>
<div class="score" id="dailyOutlookScore">--</div>
<div style="opacity:0.7;font-size:0.9rem;margin-top:0.5rem">
Based on SPC Day 1 Risk
</div>
</div>

<div class="card">
<div class="section-title">Video / Live Chance</div>
<div id="videoChance">--</div>
<div id="liveMode">Streaming Mode: --</div>
</div>

<div class="card">
<div class="section-title">Active U.S. Alerts</div>
<ul id="alertsList"></ul>
</div>

<div class="card" style="grid-column:1/-1">
<div class="section-title">Projected Weather Score</div>
<canvas id="weatherChart" height="100"></canvas>
</div>

</div>

<footer>
Powered by National U.S. Severe Weather Data · 2026
</footer>

<script>

const NWS_ALERTS="https://api.weather.gov/alerts/active?status=actual";
const SPC_OUTLOOK="https://www.spc.noaa.gov/products/outlook/day1otlk_cat.lyr.geojson";

let NATIONAL_ALERT_SCORE=0;
let DYNAMIC_THRESHOLD=300;
let weatherChart;

// LEVEL + COLOR
function setBadge(score){
  const badge=document.getElementById("levelBadge");
  if(score>=400){
    badge.textContent="Extreme Risk";
    badge.className="badge extreme";
  }else if(score>=300){
    badge.textContent="High Risk";
    badge.className="badge high";
  }else if(score>=200){
    badge.textContent="Moderate Risk";
    badge.className="badge medium";
  }else{
    badge.textContent="Low Risk";
    badge.className="badge low";
  }
}

// VIDEO CHANCE
function getVideoChance(score,spc){
  if(spc>=400||score>=400)
    return {text:"🔥 EXTREME – LIVE Coverage Very Likely",color:"#dc2626"};
  if(spc>=300||score>=300)
    return {text:"⚠️ HIGH – Strong Live Potential",color:"#f97316"};
  if(score>=200)
    return {text:"🟡 MODERATE – Possible Stream",color:"#facc15"};
  return {text:"🟢 LOW – Probably No Stream",color:"#16a34a"};
}

// SPC
async function fetchSPC(){
  try{
    const data=await fetch(SPC_OUTLOOK).then(r=>r.json());
    let values=[];
    data.features.forEach(f=>{
      const r=f.properties.LABEL;
      if(r.includes("TSTM")) values.push(50);
      else if(r.includes("MRGL")) values.push(100);
      else if(r.includes("SLGT")) values.push(200);
      else if(r.includes("ENH")) values.push(300);
      else if(r.includes("MDT")) values.push(400);
      else if(r.includes("HIGH")) values.push(500);
    });
    return values.length?Math.max(...values):0;
  }catch{return 0;}
}

// NWS
async function fetchAlerts(){
  try{
    const data=await fetch(NWS_ALERTS).then(r=>r.json());
    const list=document.getElementById("alertsList");
    list.innerHTML="";
    let scores=[];
    data.features.forEach(a=>{
      if(a.properties.country!=="US") return;
      const e=a.properties.event.toLowerCase();
      let s=0;
      if(e.includes("tornado")||e.includes("hurricane")) s=400;
      else if(e.includes("severe thunderstorm")) s=250;
      else if(e.includes("flood")) s=150;
      else s=75;
      scores.push(s);
      const li=document.createElement("li");
      li.textContent=a.properties.event+" — "+a.properties.areaDesc;
      list.appendChild(li);
    });
    NATIONAL_ALERT_SCORE=scores.length?Math.max(...scores):0;
  }catch{NATIONAL_ALERT_SCORE=0;}
}

// UPDATE
async function updateWeather(){

  await fetchAlerts();
  const spc=await fetchSPC();

  document.getElementById("dailyOutlookScore").textContent=spc;

  const base=Math.floor(Math.random()*100)+50;

  let finalScore=Math.min(
    base*0.3+
    NATIONAL_ALERT_SCORE*0.4+
    spc*0.3
  ,500);

  DYNAMIC_THRESHOLD=Math.max(spc,300);

  document.getElementById("score").textContent=Math.round(finalScore);
  document.getElementById("thresholdValue").textContent=DYNAMIC_THRESHOLD;

  setBadge(finalScore);

  const chance=getVideoChance(finalScore,spc);
  const box=document.getElementById("videoChance");
  box.textContent=chance.text;
  box.style.color=chance.color;

  const live=document.getElementById("liveMode");
  if(spc>=400){
    live.textContent="Streaming Mode: HIGH RISK – LIKELY LIVE";
    live.style.background="#dc2626";
  }else if(spc>=200){
    live.textContent="Streaming Mode: STANDBY";
    live.style.background="#f97316";
  }else{
    live.textContent="Streaming Mode: OFF";
    live.style.background="#374151";
  }

  generateChart(finalScore);
}

// CHART
function generateChart(current){
  const ctx=document.getElementById("weatherChart");
  if(weatherChart) weatherChart.destroy();
  weatherChart=new Chart(ctx,{
    type:'line',
    data:{
      labels:["Now","+10","+20","+30","+40","+50","+60"],
      datasets:[{
        label:"U.S. Score",
        data:[
          current,
          current+Math.random()*40-20,
          current+Math.random()*50-25,
          current+Math.random()*60-30,
          current+Math.random()*70-35,
          current+Math.random()*80-40,
          current+Math.random()*90-45
        ],
        borderColor:"#38bdf8",
        fill:false
      }]
    },
    options:{
      plugins:{legend:{labels:{color:"white"}}},
      scales:{
        y:{beginAtZero:true,max:500,ticks:{color:"white"}},
        x:{ticks:{color:"white"}}
      }
    }
  });
}

updateWeather();
setInterval(updateWeather,300000);

</script>
</body>
</html>
