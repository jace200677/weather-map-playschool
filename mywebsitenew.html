<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jace's Website – USA Weather Score</title>

<style>
:root{
  --green:#1f4d2b;
  --light:#f6f1e6;
  --accent:#f5c542;
  --danger:#b91c1c;
}
body{margin:0;font-family:system-ui,sans-serif;background:var(--light);color:#2a2a2a}
header{text-align:center;padding:2rem}
nav{background:var(--green);padding:0.75rem;text-align:center}
nav a{color:#fff;text-decoration:none;margin:0 1rem;font-weight:600}
section{max-width:950px;margin:auto;padding:2rem 1rem}
h2{color:var(--green)}
.intensity{display:flex;justify-content:space-between;gap:1rem;background:#fff;padding:1.5rem;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,0.15);flex-wrap:wrap}
.score{font-size:3rem;font-weight:800;color:var(--green)}
.score.high{color:var(--danger)}
.level{font-weight:700;padding:0.4rem 0.75rem;border-radius:999px;background:var(--accent)}
#liveMode{margin-top:1rem;font-weight:700;text-align:center;padding:0.75rem;border-radius:12px;background:#ddd}
.box{margin-top:1rem;background:#fff;padding:1rem;border-radius:16px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
footer{background:var(--green);color:#fff;text-align:center;padding:2rem}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
<h1>United States Weather Intensity</h1>
</header>

<section>

<div class="intensity">
<div>
<div class="score" id="score">--</div>
<div class="level" id="level">Loading...</div>
<small>Composite U.S. Weather Score (0–500)</small><br>
<small>Dynamic Threshold: <span id="thresholdValue">--</span></small>
</div>
<div>
<p id="details"></p>
</div>
</div>

<div class="box">
Daily U.S. Severe Outlook Score:
<strong><span id="dailyOutlookScore">--</span></strong>
</div>

<div id="liveMode">Streaming Mode: --</div>

<div class="box">
<h3>Active U.S. Alerts</h3>
<ul id="alertsList"></ul>
</div>

<div class="box">
<h3>Projected Score</h3>
<canvas id="weatherChart" height="120"></canvas>
</div>

</section>

<footer>
© 2026 Northwoods Playschool – USA Only
</footer>

<script>

// ---------------- CONFIG ----------------
const NWS_ALERTS = "https://api.weather.gov/alerts/active?status=actual";
const SPC_OUTLOOK = "https://www.spc.noaa.gov/products/outlook/day1otlk_cat.lyr.geojson";

let weatherChart;
let NATIONAL_ALERT_SCORE = 0;
let DYNAMIC_THRESHOLD = 300;

// ---------------- LOCAL INTENSITY (U.S. average based model) ----------------
function calculateBaseUSIntensity(){
  // General national baseline
  return Math.floor(Math.random()*100)+50;
}

function getLevel(score){
  if(score>=350) return "High";
  if(score>=200) return "Moderate";
  return "Low";
}

// ---------------- SPC OUTLOOK (USA ONLY) ----------------
async function fetchSPCOutlookScore(){
  try{
    const data=await fetch(SPC_OUTLOOK).then(r=>r.json());
    let values=[];
    data.features.forEach(f=>{
      const risk=f.properties.LABEL;
      let v=0;
      if(risk.includes("TSTM")) v=50;
      else if(risk.includes("MRGL")) v=100;
      else if(risk.includes("SLGT")) v=200;
      else if(risk.includes("ENH")) v=300;
      else if(risk.includes("MDT")) v=400;
      else if(risk.includes("HIGH")) v=500;
      values.push(v);
    });
    return values.length?Math.max(...values):0;
  }catch{return 0;}
}

// ---------------- NWS ALERTS (USA ONLY FILTER) ----------------
async function updateNWSAlerts(){
  try{
    const data=await fetch(NWS_ALERTS).then(r=>r.json());
    let alerts=data.features||[];
    const list=document.getElementById("alertsList");
    list.innerHTML="";
    let scores=[];

    alerts.forEach(a=>{
      if(a.properties.country !== "US") return;

      const event=a.properties.event.toLowerCase();
      let score=0;

      if(event.includes("tornado")||event.includes("hurricane")) score=400;
      else if(event.includes("severe thunderstorm")) score=250;
      else if(event.includes("flood")) score=150;
      else score=75;

      scores.push(score);

      const li=document.createElement("li");
      li.textContent=a.properties.event+" — "+a.properties.areaDesc;
      list.appendChild(li);
    });

    NATIONAL_ALERT_SCORE=scores.length?Math.max(...scores):0;

  }catch{NATIONAL_ALERT_SCORE=0;}
}

// ---------------- UPDATE WEATHER ----------------
async function updateWeather(){

  await updateNWSAlerts();
  const spcScore=await fetchSPCOutlookScore();
  document.getElementById("dailyOutlookScore").textContent=spcScore;

  const baseScore=calculateBaseUSIntensity();

  let finalScore=Math.min(
    baseScore*0.3+
    NATIONAL_ALERT_SCORE*0.4+
    spcScore*0.3
  ,500);

  DYNAMIC_THRESHOLD=Math.max(spcScore,300);

  document.getElementById("score").textContent=Math.round(finalScore);
  document.getElementById("level").textContent=getLevel(finalScore);
  document.getElementById("thresholdValue").textContent=DYNAMIC_THRESHOLD;
  document.getElementById("details").textContent="United States Severe Weather Monitoring Active";

  const liveMode=document.getElementById("liveMode");

  if(spcScore>=400){
    liveMode.textContent="Streaming Mode: HIGH RISK – LIKELY LIVE (USA)";
    liveMode.style.background="red";
    liveMode.style.color="white";
  }
  else if(spcScore>=200){
    liveMode.textContent="Streaming Mode: STANDBY (USA)";
    liveMode.style.background="orange";
  }
  else{
    liveMode.textContent="Streaming Mode: OFF (USA)";
    liveMode.style.background="#ddd";
  }

  generateForecast(finalScore);
}

// ---------------- FORECAST ----------------
function generateForecast(current){
  const ctx=document.getElementById("weatherChart");
  if(weatherChart) weatherChart.destroy();
  weatherChart=new Chart(ctx,{
    type:'line',
    data:{
      labels:["Now","+10","+20","+30","+40","+50","+60"],
      datasets:[{
        label:"USA Score",
        data:[
          current,
          current+Math.random()*50-25,
          current+Math.random()*60-30,
          current+Math.random()*70-35,
          current+Math.random()*80-40,
          current+Math.random()*90-45,
          current+Math.random()*100-50
        ],
        borderColor:"green",
        fill:true
      }]
    },
    options:{scales:{y:{beginAtZero:true,max:500}}}
  });
}

// ---------------- INIT ----------------
updateWeather();
setInterval(updateWeather,300000);

</script>
</body>
</html>
