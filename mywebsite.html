<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOAA Weather Center</title>

<style>
:root{
--green:#1f4d2b;
--light:#f6f1e6;
--accent:#f5c542;
--danger:#b91c1c;
}
body{margin:0;font-family:system-ui;background:var(--light);color:#222}
header{text-align:center;padding:2rem}
nav{background:var(--green);padding:1rem;text-align:center}
nav a{color:#fff;margin:0 1rem;text-decoration:none;font-weight:600}
section{max-width:1000px;margin:auto;padding:2rem}
h2{color:var(--green)}
.card{background:#fff;padding:1rem;border-radius:16px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
#sevenDayContainer{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem}
.streaming-box{padding:1rem;border-radius:16px;text-align:center;font-weight:800;font-size:1.2rem}
.off{background:#222;color:#fff}
.standby{background:#f59e0b;color:#fff}
.live{background:#b91c1c;color:#fff}
iframe{width:100%;height:315px;border:none;border-radius:12px;margin-top:1rem}
footer{background:var(--green);color:#fff;text-align:center;padding:2rem;margin-top:2rem}
</style>
</head>
<body>

<header>
<h1>🌪 NOAA-Based Weather Center</h1>
</header>

<nav>
<a href="#weather">Weather</a>
<a href="#sevenDay">7-Day Outlook</a>
<a href="#youtube">YouTube</a>
<a href="#wishingWell">Wishing Well</a>
</nav>

<section id="weather">
<h2>Current Weather Intensity</h2>
<div class="card">
<div style="font-size:2rem;font-weight:800" id="currentScore">--</div>
<div id="currentDetails"></div>
<div id="liveChanceNow" style="margin-top:1rem;font-weight:700"></div>
</div>
</section>

<section id="sevenDay">
<h2>7-Day Daily Outlook Score (NOAA)</h2>

<div id="streamingModeBox" class="streaming-box off">
Streaming Mode: <span id="streamingMode">Checking...</span>
</div>

<br>
<div id="sevenDayContainer"></div>
</section>

<section id="youtube">
<h2>Jace's YouTube Channel</h2>
<div id="ytContainer"></div>
</section>

<section id="wishingWell">
<h2>🌟 Wishing Well</h2>
<form action="mailto:jacefink17@outlook.com" method="post" enctype="text/plain" style="max-width:500px;margin:auto;">
<input type="text" name="name" placeholder="Your Name" required style="width:100%;padding:0.5rem;margin-bottom:0.75rem;">
<input type="text" name="wish" placeholder="Enter your wish here…" required style="width:100%;padding:0.5rem;margin-bottom:0.75rem;">
<button type="submit" style="padding:0.5rem 1rem;background:#f5c542;border:none;font-weight:700;">
Send Wish
</button>
</form>
</section>

<footer>
Powered by NOAA & NWS API
</footer>

<script>

// ---------------- CONFIG ----------------
const LAT=44.9778;
const LON=-93.2650;
const NWS_POINTS=`https://api.weather.gov/points/${LAT},${LON}`;
const ALERTS_URL=`https://api.weather.gov/alerts/active?point=${LAT},${LON}`;

const API_KEY="YOUR_YOUTUBE_API_KEY";
const CHANNEL_ID="YOUR_CHANNEL_ID";
let isLiveNow=false;

// ---------------- FETCH FORECAST ----------------
async function fetchForecast(){
const point=await fetch(NWS_POINTS).then(r=>r.json());
const forecastURL=point.properties.forecast;
const forecast=await fetch(forecastURL).then(r=>r.json());
return forecast.properties.periods.slice(0,14);
}

// ---------------- FETCH ALERTS ----------------
async function fetchAlerts(){
const alerts=await fetch(ALERTS_URL).then(r=>r.json());
return alerts.features||[];
}

// ---------------- SCORE ALERTS ----------------
function scoreAlerts(alerts){
let score=0;
alerts.forEach(a=>{
const e=a.properties.event.toLowerCase();
if(e.includes("tornado")||e.includes("hurricane"))score+=200;
else if(e.includes("severe"))score+=150;
else if(e.includes("flood"))score+=120;
else if(e.includes("winter"))score+=100;
else if(e.includes("wind"))score+=80;
else score+=40;
});
return Math.min(score,500);
}

// ---------------- DAILY OUTLOOK SCORE ----------------
function calculateDOS(period, alertScore){
let score=0;

if(period.temperature>=95||period.temperature<=20)score+=120;
if(period.windSpeed.includes("30"))score+=120;
if(period.shortForecast.toLowerCase().includes("storm"))score+=150;
if(period.shortForecast.toLowerCase().includes("snow"))score+=100;
if(period.shortForecast.toLowerCase().includes("rain"))score+=80;

score+=alertScore*0.5;

return Math.min(score,500);
}

// ---------------- LIVE STREAM % ----------------
function livePercent(score){
return Math.round(score/500*100);
}

// ---------------- STREAMING MODE ----------------
function updateStreamingMode(percent){
const box=document.getElementById("streamingModeBox");
const text=document.getElementById("streamingMode");
box.classList.remove("off","standby","live");

if(isLiveNow){
box.classList.add("live");
text.textContent="LIVE";
return;
}

if(percent>=60){
box.classList.add("standby");
text.textContent="STANDBY";
}else{
box.classList.add("off");
text.textContent="OFF";
}
}

// ---------------- GENERATE 7 DAY ----------------
async function generateSevenDay(){
const periods=await fetchForecast();
const alerts=await fetchAlerts();
const alertScore=scoreAlerts(alerts);

const container=document.getElementById("sevenDayContainer");
container.innerHTML="";

for(let i=0;i<periods.length;i+=2){
const day=periods[i];
const dos=calculateDOS(day,alertScore);
const percent=livePercent(dos);

const card=document.createElement("div");
card.className="card";
card.innerHTML=`
<h3>${day.name}</h3>
<strong>DOS:</strong> ${dos}/500<br>
<strong>Temp:</strong> ${day.temperature}°${day.temperatureUnit}<br>
<strong>Forecast:</strong> ${day.shortForecast}<br>
<hr>
<strong>Live Stream Chance:</strong> ${percent}%
`;
container.appendChild(card);

if(i===0){
document.getElementById("currentScore").textContent=dos+"/500";
document.getElementById("currentDetails").textContent=day.shortForecast;
document.getElementById("liveChanceNow").textContent="Live Chance Today: "+percent+"%";
updateStreamingMode(percent);
}
}
}

// ---------------- YOUTUBE LIVE ----------------
async function checkYouTube(){
const liveData=await fetch(
`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`
).then(r=>r.json());

const container=document.getElementById("ytContainer");
container.innerHTML="";

if(liveData.items && liveData.items.length>0){
isLiveNow=true;
const id=liveData.items[0].id.videoId;
const iframe=document.createElement("iframe");
iframe.src=`https://www.youtube.com/embed/${id}?autoplay=1`;
container.appendChild(iframe);
}else{
isLiveNow=false;
container.innerHTML="<p>Channel is currently offline.</p>";
}
}

// ---------------- INIT ----------------
async function init(){
await checkYouTube();
await generateSevenDay();
}

init();
setInterval(init,300000);

</script>
</body>
</html>
