<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jace's Website – Weather Center</title>

<style>
:root {
  --green:#1f4d2b;
  --light:#f6f1e6;
  --accent:#f5c542;
  --danger:#b91c1c;
}
body{margin:0;font-family:system-ui;background:var(--light);color:#222}
header{text-align:center;padding:2rem}
nav{background:var(--green);padding:1rem;text-align:center}
nav a{color:#fff;margin:0 1rem;text-decoration:none;font-weight:600}
section{max-width:1000px;margin:auto;padding:2rem}
h2{color:var(--green)}
.card{background:#fff;padding:1rem;border-radius:16px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
#sevenDayContainer{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem}
.streaming-box{padding:1rem;border-radius:16px;text-align:center;font-weight:800;font-size:1.2rem}
.off{background:#222;color:#fff}
.standby{background:#f59e0b;color:#fff}
.live{background:#b91c1c;color:#fff}
iframe{width:100%;height:315px;border:none;border-radius:12px;margin-top:1rem}
footer{background:var(--green);color:#fff;text-align:center;padding:2rem;margin-top:2rem}
</style>
</head>
<body>

<header>
<h1>🌪 Northwoods Playschool Weather Center</h1>
</header>

<nav>
<a href="#weather">Weather</a>
<a href="#sevenDay">7-Day Outlook</a>
<a href="#youtube">YouTube</a>
<a href="#wishingWell">Wishing Well</a>
</nav>

<section id="weather">
<h2>Current Weather Score</h2>
<div class="card">
<div style="font-size:2rem;font-weight:800" id="currentScore">--</div>
<div id="currentDetails"></div>
<div id="liveChanceNow" style="margin-top:1rem;font-weight:700"></div>
</div>
</section>

<section id="sevenDay">
<h2>7-Day Daily Outlook Score (DOS)</h2>

<div id="streamingModeBox" class="streaming-box off">
Streaming Mode: <span id="streamingMode">Checking...</span>
</div>

<br>
<div id="sevenDayContainer"></div>
</section>

<section id="youtube">
<h2>Jace's YouTube Channel</h2>
<div id="ytContainer"></div>
</section>

<section id="wishingWell">
<h2>🌟 Wishing Well</h2>
<p>Send a wish to the owner.</p>

<form action="mailto:jacefink17@outlook.com" method="post" enctype="text/plain" style="max-width:500px;margin:auto;">
<input type="text" name="name" placeholder="Your Name" required
style="width:100%;padding:0.5rem;border-radius:8px;border:1px solid #ccc;margin-bottom:0.75rem;">
<input type="text" name="wish" placeholder="Enter your wish here…" required
style="width:100%;padding:0.5rem;border-radius:8px;border:1px solid #ccc;margin-bottom:0.75rem;">
<button type="submit"
style="padding:0.5rem 1rem;background:#f5c542;border:none;border-radius:8px;font-weight:700;cursor:pointer;">
Send Wish
</button>
</form>
</section>

<footer>
© 2026 Northwoods Playschool
</footer>

<script>

// ---------------- CONFIG ----------------
const API_KEY="YOUR_YOUTUBE_API_KEY";
const CHANNEL_ID="YOUR_CHANNEL_ID";
let isLiveNow=false;

// ---------------- WEATHER SCORE ----------------
function calculateWeatherScore(){
    const temp=60+Math.random()*40;
    const wind=Math.random()*40;
    const humidity=30+Math.random()*70;

    let score=0;
    if(temp>=90||temp<=32)score+=120;
    if(wind>=25)score+=150;
    if(humidity>=90||humidity<=20)score+=50;

    return Math.min(score+Math.random()*100,500);
}

// ---------------- DAILY OUTLOOK ----------------
function calculateDailyOutlookScore(base){
    const tropical=Math.random()*120;
    const severe=Math.random()*150;
    const flooding=Math.random()*100;
    const winter=Math.random()*80;

    const combined=Math.sqrt(
        tropical*tropical+
        severe*severe+
        flooding*flooding+
        winter*winter
    );

    const confidence=70+Math.random()*30;

    return{
        tropical,severe,flooding,winter,
        combined:Math.min(combined,500),
        confidence
    };
}

// ---------------- WEATHER INTENSITY ----------------
function calculateWeatherIntensityScore(){
    const official=Math.random()*200;
    const population=Math.random()*100;
    const cameras=Math.random()*60;
    const stormReports=Math.random()*120;
    const emergency=Math.random()*100;
    const publicInterest=Math.random()*80;
    const tropical=Math.random()*150;

    const total=
        official*0.25+
        population*0.1+
        cameras*0.05+
        stormReports*0.15+
        emergency*0.15+
        publicInterest*0.1+
        tropical*0.2;

    return Math.min(total,500);
}

// ---------------- LIVE STREAM % ----------------
function calculateLivePercent(score){
    return Math.min(Math.round(score/500*100),100);
}

// ---------------- STREAMING MODE ----------------
function updateStreamingMode(todayPercent){
    const box=document.getElementById("streamingModeBox");
    const text=document.getElementById("streamingMode");

    box.classList.remove("off","standby","live");

    if(isLiveNow){
        box.classList.add("live");
        text.textContent="LIVE";
        return;
    }

    if(todayPercent>=60){
        box.classList.add("standby");
        text.textContent="STANDBY";
    }else{
        box.classList.add("off");
        text.textContent="OFF";
    }
}

// ---------------- GENERATE 7 DAYS ----------------
function generateSevenDay(baseScore){
    const container=document.getElementById("sevenDayContainer");
    container.innerHTML="";

    for(let i=0;i<7;i++){
        const date=new Date();
        date.setDate(date.getDate()+i);

        const outlook=calculateDailyOutlookScore(baseScore);
        const wis=calculateWeatherIntensityScore();
        const percent=calculateLivePercent(outlook.combined);

        const card=document.createElement("div");
        card.className="card";
        card.innerHTML=`
        <h3>${date.toDateString()}</h3>
        <strong>DOS:</strong> ${Math.round(outlook.combined)} / 500<br>
        <strong>WIS:</strong> ${Math.round(wis)} / 500<br>
        <small>
        Tropical: ${Math.round(outlook.tropical)} |
        Severe: ${Math.round(outlook.severe)} |
        Flooding: ${Math.round(outlook.flooding)} |
        Winter: ${Math.round(outlook.winter)}
        </small>
        <br>
        <small>Forecast Confidence: ${Math.round(outlook.confidence)}%</small>
        <hr>
        <strong>Live Stream Chance:</strong> ${percent}%
        `;
        container.appendChild(card);

        if(i===0) updateStreamingMode(percent);
    }
}

// ---------------- UPDATE CURRENT ----------------
function updateCurrent(){
    const score=calculateWeatherScore();
    const percent=calculateLivePercent(score);

    document.getElementById("currentScore").textContent=Math.round(score)+"/500";
    document.getElementById("currentDetails").textContent="Composite Weather Intensity Score";
    document.getElementById("liveChanceNow").textContent="Live Stream Chance Today: "+percent+"%";

    generateSevenDay(score);
}

// ---------------- YOUTUBE LIVE + UPLOADS ----------------
async function checkYouTubeLive(){
    try{
        const liveData=await fetch(
        `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`
        ).then(r=>r.json());

        const container=document.getElementById("ytContainer");
        container.innerHTML="";

        if(liveData.items && liveData.items.length>0){
            isLiveNow=true;
            const id=liveData.items[0].id.videoId;
            const iframe=document.createElement("iframe");
            iframe.src=`https://www.youtube.com/embed/${id}?autoplay=1`;
            container.appendChild(iframe);
        }else{
            isLiveNow=false;

            const uploads=await fetch(
            `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&maxResults=3&order=date&type=video&key=${API_KEY}`
            ).then(r=>r.json());

            uploads.items.forEach(video=>{
                const iframe=document.createElement("iframe");
                iframe.src=`https://www.youtube.com/embed/${video.id.videoId}`;
                container.appendChild(iframe);
            });
        }

    }catch{
        isLiveNow=false;
    }
}

// ---------------- INIT ----------------
async function init(){
    await checkYouTubeLive();
    updateCurrent();
}

init();
setInterval(init,300000);

</script>
</body>
</html>
