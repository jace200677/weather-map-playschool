<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Weather Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; background: #0b1220; color: white; margin:0; padding:20px; }
.section { background: #111a30; padding: 20px; margin-bottom: 20px; border-radius: 12px; }
h1,h2 { margin-top: 0; }
.badge { padding: 4px 10px; border-radius: 6px; font-weight: bold; }
.live { background: red; }
.standby { background: orange; }
.off { background: #555; }
.yes { color: #00ff88; }
.probably { color: #66ccff; }
.maybe { color: orange; }
.notlikely { color: #777; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #555; padding: 6px; text-align: center; }
</style>
</head>
<body>

<h1>National Weather Operations Center</h1>

<!-- Wishing Well -->
<div class="section">
<h2>Wishing Well</h2>
<p>Send a wish to the team!</p>
<button onclick="wish()">Make a Wish</button>
<p id="wishResult"></p>
</div>

<!-- YouTube Video Section -->
<div class="section">
<h2>Latest Weather Discussion</h2>
<div id="ytLiveContainer">
<iframe id="latestVideo" width="100%" height="400"
src="https://www.youtube.com/embed?listType=user_uploads&list=YOUR_CHANNEL_USERNAME"
frameborder="0" allowfullscreen></iframe>
</div>
</div>

<!-- 7-Day DOS Chart -->
<div class="section">
<h2>7-Day National Daily Outlook Score (DOS)</h2>
<canvas id="dosChart"></canvas>
</div>

<!-- 7-Day DOS Table -->
<div class="section">
<h2>7-Day Operations Table</h2>
<table>
<thead>
<tr>
<th>Day</th>
<th>DOS</th>
<th>Video Probability</th>
<th>Live Coverage %</th>
<th>Streaming Mode</th>
</tr>
</thead>
<tbody id="dosTable"></tbody>
</table>
</div>

<script>
// YouTube Live Check
const YT_API_KEY = "YOUR_YOUTUBE_API_KEY";
const CHANNEL_ID = "YOUR_CHANNEL_ID";

async function isChannelLive() {
    try {
        const res = await fetch(
            `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${YT_API_KEY}`
        );
        const data = await res.json();
        return data.items && data.items.length > 0;
    } catch(e) { return false; }
}

// NOAA Data - National Alerts (simplified)
async function getNationalAlerts() {
    try {
        const res = await fetch("https://api.weather.gov/alerts/active");
        const data = await res.json();
        return data.features.length;
    } catch(e) { return 0; }
}

// NOAA SPC Outlook (severe)
async function getSPCOutlook() {
    try {
        const res = await fetch("https://www.spc.noaa.gov/products/outlook/day1otlk_cat.json");
        const data = await res.json();
        return data.features.length;
    } catch(e) { return 0; }
}

// NOAA WPC Flood
async function getWPCFlood() {
    try {
        const res = await fetch("https://www.wpc.ncep.noaa.gov/qpf/excessive_rainfall.json");
        const data = await res.json();
        return data.features ? data.features.length : 0;
    } catch(e) { return 0; }
}

// Calculate DOS
function calculateDOS(alerts, severe, flood){
    let score = 0;
    score += alerts * 2;
    score += severe * 20;
    score += flood * 15;
    return Math.min(Math.round(score),500);
}

// Video Probability
function videoProbability(score,date){
    if(date.getDay()===1) return "yes"; // Monday always yes
    if(score >= 350) return "yes";
    if(score >= 250) return "probably";
    if(score >= 150) return "maybe";
    return "not likely";
}

// Live Coverage %
function liveCoverageChance(score){ return Math.min(Math.round(score/5),100); }

// Streaming Mode
async function streamMode(score){
    const liveNow = await isChannelLive();
    if(liveNow) return "Live";
    if(score>=300) return "Standby";
    return "Off";
}

// Build Dashboard
async function buildDashboard(){
    const alerts = await getNationalAlerts();
    const severe = await getSPCOutlook();
    const flood = await getWPCFlood();
    const tbody = document.getElementById("dosTable");
    tbody.innerHTML = "";
    let labels=[], values=[];

    for(let i=0;i<7;i++){
        const date = new Date();
        date.setDate(date.getDate()+i);
        const score = calculateDOS(alerts,severe,flood);
        const video = videoProbability(score,date);
        const liveChance = liveCoverageChance(score);
        const mode = await streamMode(score);

        labels.push(date.toLocaleDateString());
        values.push(score);

        tbody.innerHTML += `<tr>
            <td>${date.toLocaleDateString()}</td>
            <td>${score}</td>
            <td class="${video.replace(" ","")}">${video.toUpperCase()}</td>
            <td>${liveChance}%</td>
            <td><span class="badge ${mode.toLowerCase()}">${mode}</span></td>
        </tr>`;
    }

    new Chart(document.getElementById("dosChart"),{
        type:'line',
        data:{ labels:labels, datasets:[{ label:"National DOS", data:values, borderColor:"cyan", fill:false }] },
        options:{ scales:{ y:{min:0,max:500} } }
    });
}

// Wishing Well
function wish(){
    const results=[
        "Clear skies ahead!",
        "Storms stay offshore!",
        "Quiet weather week!",
        "Models trending calmer!",
        "High pressure dominates!"
    ];
    document.getElementById("wishResult").innerText = results[Math.floor(Math.random()*results.length)];
}

// Initialize
buildDashboard();
</script>
</body>
</html>
