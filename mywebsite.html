<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USA NOAA Weather Center</title>

<style>
:root{
--green:#1f4d2b;
--light:#f6f1e6;
--danger:#b91c1c;
--accent:#f59e0b;
}
body{margin:0;font-family:system-ui;background:var(--light);color:#222}
header{text-align:center;padding:2rem}
nav{background:var(--green);padding:1rem;text-align:center}
nav a{color:#fff;margin:0 1rem;text-decoration:none;font-weight:600}
section{max-width:1100px;margin:auto;padding:2rem}
h2{color:var(--green)}
.card{background:#fff;padding:1rem;border-radius:16px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
#sevenDayContainer{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem}
.streaming-box{padding:1rem;border-radius:16px;text-align:center;font-weight:800;font-size:1.2rem}
.off{background:#222;color:#fff}
.standby{background:var(--accent);color:#fff}
.live{background:var(--danger);color:#fff}
iframe{width:100%;height:315px;border:none;border-radius:12px;margin-top:1rem}
footer{background:var(--green);color:#fff;text-align:center;padding:2rem;margin-top:2rem}
</style>
</head>
<body>

<header>
<h1>🇺🇸 United States NOAA Weather Center</h1>
</header>

<nav>
<a href="#national">National Weather</a>
<a href="#sevenDay">7-Day Outlook</a>
<a href="#youtube">YouTube</a>
<a href="#wishingWell">Wishing Well</a>
</nav>

<section id="national">
<h2>National Weather Intensity</h2>
<div class="card">
<div style="font-size:2rem;font-weight:800" id="nationalScore">--</div>
<div id="nationalDetails"></div>
<div id="liveChanceNow" style="margin-top:1rem;font-weight:700"></div>
</div>
</section>

<section id="sevenDay">
<h2>7-Day National Outlook (NOAA Alerts Based)</h2>

<div id="streamingModeBox" class="streaming-box off">
Streaming Mode: <span id="streamingMode">Checking...</span>
</div>

<br>
<div id="sevenDayContainer"></div>
</section>

<section id="youtube">
<h2>Jace's YouTube Channel</h2>
<div id="ytContainer"></div>
</section>

<section id="wishingWell">
<h2>🌟 Wishing Well</h2>
<form action="mailto:jacefink17@outlook.com" method="post" enctype="text/plain" style="max-width:500px;margin:auto;">
<input type="text" name="name" placeholder="Your Name" required style="width:100%;padding:0.5rem;margin-bottom:0.75rem;">
<input type="text" name="wish" placeholder="Enter your wish here…" required style="width:100%;padding:0.5rem;margin-bottom:0.75rem;">
<button type="submit" style="padding:0.5rem 1rem;background:#f5c542;border:none;font-weight:700;">
Send Wish
</button>
</form>
</section>

<footer>
Data provided by NOAA / NWS API
</footer>

<script>

// ---------------- CONFIG ----------------
const ALERTS_URL="https://api.weather.gov/alerts/active?status=actual";
const API_KEY="YOUR_YOUTUBE_API_KEY";
const CHANNEL_ID="YOUR_CHANNEL_ID";
let isLiveNow=false;

// ---------------- FETCH NATIONAL ALERTS ----------------
async function fetchNationalAlerts(){
const data=await fetch(ALERTS_URL).then(r=>r.json());
return data.features||[];
}

// ---------------- ALERT SEVERITY WEIGHT ----------------
function severityWeight(event){
event=event.toLowerCase();
if(event.includes("tornado")||event.includes("hurricane"))return 250;
if(event.includes("extreme wind"))return 200;
if(event.includes("severe thunderstorm"))return 180;
if(event.includes("flood"))return 160;
if(event.includes("blizzard"))return 170;
if(event.includes("winter storm"))return 150;
if(event.includes("wind"))return 120;
return 60;
}

// ---------------- NATIONAL WEATHER INTENSITY SCORE ----------------
function calculateNationalScore(alerts){
let total=0;
alerts.forEach(a=>{
total+=severityWeight(a.properties.event);
});
return Math.min(total,500);
}

// ---------------- DAILY OUTLOOK SCORE ----------------
function calculateDailyScore(alerts){
let score=0;

alerts.forEach(a=>{
const event=a.properties.event.toLowerCase();
if(event.includes("watch"))score+=40;
if(event.includes("warning"))score+=80;
if(event.includes("emergency"))score+=150;
});

return Math.min(score,500);
}

// ---------------- LIVE STREAM % ----------------
function livePercent(score){
return Math.round(score/500*100);
}

// ---------------- STREAMING MODE ----------------
function updateStreamingMode(percent){
const box=document.getElementById("streamingModeBox");
const text=document.getElementById("streamingMode");
box.classList.remove("off","standby","live");

if(isLiveNow){
box.classList.add("live");
text.textContent="LIVE";
return;
}

if(percent>=60){
box.classList.add("standby");
text.textContent="STANDBY";
}else{
box.classList.add("off");
text.textContent="OFF";
}
}

// ---------------- GENERATE 7 DAY NATIONAL ----------------
async function generateSevenDay(){
const alerts=await fetchNationalAlerts();
const container=document.getElementById("sevenDayContainer");
container.innerHTML="";

const nationalScore=calculateNationalScore(alerts);
const dos=calculateDailyScore(alerts);
const percent=livePercent(dos);

document.getElementById("nationalScore").textContent=nationalScore+"/500";
document.getElementById("nationalDetails").textContent=alerts.length+" Active NOAA Alerts Across USA";
document.getElementById("liveChanceNow").textContent="National Live Stream Chance: "+percent+"%";

updateStreamingMode(percent);

for(let i=0;i<7;i++){
const date=new Date();
date.setDate(date.getDate()+i);

const card=document.createElement("div");
card.className="card";
card.innerHTML=`
<h3>${date.toDateString()}</h3>
<strong>DOS:</strong> ${dos}/500<br>
<strong>WIS:</strong> ${nationalScore}/500<br>
<hr>
<strong>Live Stream Chance:</strong> ${percent}%
`;
container.appendChild(card);
}
}

// ---------------- YOUTUBE LIVE CHECK ----------------
async function checkYouTube(){
const liveData=await fetch(
`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`
).then(r=>r.json());

const container=document.getElementById("ytContainer");
container.innerHTML="";

if(liveData.items && liveData.items.length>0){
isLiveNow=true;
const id=liveData.items[0].id.videoId;
const iframe=document.createElement("iframe");
iframe.src=`https://www.youtube.com/embed/${id}?autoplay=1`;
container.appendChild(iframe);
}else{
isLiveNow=false;
container.innerHTML="<p>Channel is currently offline.</p>";
}
}

// ---------------- INIT ----------------
async function init(){
await checkYouTube();
await generateSevenDay();
}

init();
setInterval(init,300000);

</script>
</body>
</html>
